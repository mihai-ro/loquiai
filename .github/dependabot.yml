version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"
    # codeql-action sub-actions (init/autobuild/analyze) must stay in sync —
    # grouped so all three bump in one PR. Other actions remain ungrouped.

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Dev deps only (biome, esbuild, c8, typescript) — loqui has zero runtime deps.
    # Still relevant for build-tool CVEs and type-checking regressions.
