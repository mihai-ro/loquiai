name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  # checks: write is needed by dorny/test-reporter to publish results
  checks: write

jobs:
  lint-pr-title:
    name: Lint PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            revert
            docs
            refactor
            test
            build
            ci
            chore
          requireScope: false

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run test:ci

      - uses: dorny/test-reporter@v2.6.0
        if: always()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit
