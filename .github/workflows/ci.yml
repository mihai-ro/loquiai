name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  zero-dep-check:
    name: Zero dependency guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fail if runtime dependencies are added
        run: |
          node -e "
            const p = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            if (p.dependencies && Object.keys(p.dependencies).length > 0) {
              console.error('ERROR: runtime dependencies detected — loqui must stay zero-dependency.');
              console.error(JSON.stringify(p.dependencies, null, 2));
              process.exit(1);
            }
            console.log('OK: no runtime dependencies.');
          "

  lint-pr-title:
    name: Lint PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            revert
            docs
            refactor
            test
            build
            ci
            chore
          requireScope: false

  test:
    name: Build & Test (${{ matrix.os }} / Node ${{ matrix.node }})
    needs: lint
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full Node version coverage on Linux (primary platform)
          - os: ubuntu-latest
            node: '22'
          - os: ubuntu-latest
            node: '24'
          # Spot-check path-handling on macOS and Windows with current LTS
          - os: macos-latest
            node: '24'
          - os: windows-latest
            node: '24'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
        if: matrix.os == 'ubuntu-latest' && matrix.node == '24'
      - run: pnpm run test:ci
      - run: pnpm run test:coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node == '24'

      - uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node == '24'
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit

  # Stable aggregate context required by the branch ruleset. The matrix job
  # reports per-cell contexts (e.g. "Build & Test (ubuntu-latest / Node 20)"),
  # so this gate provides a single fixed "Build & Test" status to gate merges on.
  build-and-test:
    name: Build & Test
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify matrix result
        run: '[ "${{ needs.test.result }}" = "success" ] || exit 1'
