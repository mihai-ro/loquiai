name: Publish to npm

# Triggered when Release Please publishes a GitHub Release (after merging the
# Release PR). The release is always created from a signed, version-tagged
# commit, so the published package is traceable end-to-end.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  # id-token is required for npm provenance attestation (--provenance flag).
  # This lets npm verify the package was built in this specific Actions run
  # and was not tampered with after the fact.
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@mihairo/loqui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          # Configures npm to authenticate against the public registry using
          # NODE_AUTH_TOKEN (set below from the NPM_TOKEN secret).
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci

      # prepublishOnly (defined in package.json) runs clean → build → test
      # before the upload, so the dist is always freshly compiled and verified.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
